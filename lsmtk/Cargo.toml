[package]
name = "lsmtk"
version = "0.14.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = "2021"
description = "lsmtk provides a log-structured-merge-graph"
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = ["command_line"]
command_line = ["dep:arrrg", "dep:arrrg_derive", "dep:getopts"]

[dependencies]
getopts = { workspace = true, optional = true }

arrrg = { workspace = true, optional = true }
arrrg_derive = { workspace = true, optional = true }
biometrics = { workspace = true }
buffertk = { workspace = true }
indicio = { workspace = true }
mani = { workspace = true }
one_two_eight = { workspace = true }
prototk = { workspace = true }
prototk_derive = { workspace = true }
setsum = { workspace = true }
skipfree = { workspace = true }
sst = { workspace = true }
sync42 = { workspace = true }
utilz = { workspace = true }
zerror = { workspace = true }
zerror_core = { workspace = true }
zerror_derive = { workspace = true }

[[bin]]
name = "lsmtk-init"
path = "src/bin/lsmtk-init.rs"
required-features = ["binaries"]

[[bin]]
name = "lsmtk-options"
path = "src/bin/lsmtk-options.rs"
required-features = ["binaries"]

[[bin]]
name = "lsmtk-sst-ingest"
path = "src/bin/lsmtk-sst-ingest.rs"
required-features = ["binaries"]

[[bin]]
name = "lsmtk-verify-manifest"
path = "src/bin/lsmtk-verify-manifest.rs"
required-features = ["binaries"]

[[bin]]
name = "lsmtk-verify-and-unlink"
path = "src/bin/lsmtk-verify-and-unlink.rs"
required-features = ["binaries"]

[[bin]]
name = "lsmtk-watch-for-ingest"
path = "src/bin/lsmtk-watch-for-ingest.rs"
required-features = ["binaries"]
