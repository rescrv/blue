[package]
name = "split_channel"
version = "0.19.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "split_channel provides a stream-of-messages abstraction with split send/recv channels."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = ["command_line"]
command_line = ["dep:arrrg", "dep:arrrg_derive", "dep:getopts"]

[dependencies]
libc = { workspace = true }
boring = { workspace = true }
crc32c = { workspace = true }
getopts = { workspace = true, optional = true }

biometrics = { workspace = true }
buffertk = { workspace = true }
handled = { workspace = true }
prototk = { workspace = true }
prototk_derive = { workspace = true }
rpc_pb = { workspace = true }
utilz = { workspace = true }
arrrg = { workspace = true, optional = true }
arrrg_derive = { workspace = true, optional = true }

[[example]]
name = "split_channel-benchmark-client"
path = "examples/split_channel-benchmark-client.rs"
required-features=["binaries"]

[[example]]
name = "split_channel-benchmark-server"
path = "examples/split_channel-benchmark-server.rs"
required-features=["binaries"]
