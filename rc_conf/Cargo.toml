[package]
name = "rc_conf"
version = "0.13.1"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = "2021"
description = "rc_conf provides rc.conf and rc.d-like data structures for consumption."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = ["dep:arrrg", "dep:arrrg_derive", "dep:getopts"]

[dependencies]
getopts = { workspace = true, optional = true }

arrrg = { workspace = true, optional = true }
arrrg_derive = { workspace = true, optional = true }
biometrics = { workspace = true }
shvar = { workspace = true }
utf8path = { workspace = true }

[[bin]]
name = "rcscript"
path = "src/bin/rcscript.rs"
required-features=["binaries"]

[[bin]]
name = "rcbootstrap"
path = "src/bin/rcbootstrap.rs"
required-features=["binaries"]

[[bin]]
name = "rcexamine"
path = "src/bin/rcexamine.rs"
required-features=["binaries"]

[[bin]]
name = "rclist"
path = "src/bin/rclist.rs"
required-features=["binaries"]

[[bin]]
name = "rcinvoke"
path = "src/bin/rcinvoke.rs"
required-features=["binaries"]

[[bin]]
name = "rcvar"
path = "src/bin/rcvar.rs"
required-features=["binaries"]

[[bin]]
name = "rccat"
path = "src/bin/rccat.rs"
required-features=["binaries"]

[[bin]]
name = "rccontainer"
path = "src/bin/rccontainer.rs"
required-features=["binaries"]

[[bin]]
name = "rcdebug"
path = "src/bin/rcdebug.rs"
required-features=["binaries"]

[[test]]
name = "example1"
path = "tests/example1.rs"
required-features=["binaries"]

[[test]]
name = "example2"
path = "tests/example2.rs"
required-features=["binaries"]
