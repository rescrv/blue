[package]
name = "symphonize"
version = "0.16.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "symphonize is a tool for running integration tests across services"
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = []

[dependencies]
getopts = { workspace = true }

arrrg = { workspace = true }
arrrg_derive = { workspace = true }
indicio = { workspace = true }
k8src = { workspace = true }
rc_conf = { workspace = true }
shvar = { workspace = true }
utf8path = { workspace = true }

[[bin]]
name = "symphonize"
path = "src/bin/symphonize.rs"
required-features=["binaries"]
