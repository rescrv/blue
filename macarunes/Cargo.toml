[package]
name = "macarunes"
version = "0.11.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "Macarunes provides an implementation of macaroons."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = []
base64 = ["dep:base64"]

[dependencies]
libsodium-sys-stable = { workspace = true }

base64 = { workspace = true, optional = true }
biometrics = { workspace = true }
buffertk = { workspace = true }
prototk = { workspace = true }
prototk_derive = { workspace = true }

[dev-dependencies]
arrrg = { workspace = true }
proptest = { workspace = true }
statslicer = { workspace = true }

[[bench]]
name = "verify"
harness = false
