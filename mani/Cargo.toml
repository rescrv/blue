[package]
name = "mani"
version = "0.15.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "Mani provides an in-memory manifest of related files."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = ["command_line"]
command_line = ["dep:arrrg", "dep:arrrg_derive", "dep:getopts"]

[dependencies]
crc32c = { workspace = true }
getopts = { workspace = true, optional = true }

biometrics = { workspace = true }
buffertk = { workspace = true }
handled = { workspace = true }
prototk = { workspace = true }
prototk_derive = { workspace = true }
tatl = { workspace = true }
utilz = { workspace = true }
arrrg = { workspace = true, optional = true }
arrrg_derive = { workspace = true, optional = true }

[dev-dependencies]
armnod = { workspace = true }
guacamole = { workspace = true }

[[bin]]
name = "mani-append"
path = "src/bin/mani-append.rs"
required-features=["binaries"]

[[bin]]
name = "mani-cat"
path = "src/bin/mani-cat.rs"
required-features=["binaries"]

[[bin]]
name = "mani-dump"
path = "src/bin/mani-dump.rs"
required-features=["binaries"]

[[bin]]
name = "mani-remove"
path = "src/bin/mani-remove.rs"
required-features=["binaries"]

[[bin]]
name = "mani-rollover"
path = "src/bin/mani-rollover.rs"
required-features=["binaries"]

[[bin]]
name = "mani-verify"
path = "src/bin/mani-verify.rs"
required-features=["binaries"]
