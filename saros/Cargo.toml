[package]
name = "saros"
version = "0.10.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = "2021"
description = "Saros is a terminal-based time series database."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = []

[dependencies]
chrono = { workspace = true }
getopts = { workspace = true }
nom = { workspace = true }

arrrg = { workspace = true }
arrrg_derive = { workspace = true }
biometrics = { workspace = true }
buffertk = { workspace = true }
indicio = { workspace = true }
one_two_eight = { workspace = true }
prototk = { workspace = true }
prototk_derive = { workspace = true }
rpc_pb = { workspace = true }
shvar = { workspace = true }
tag_index = { workspace = true }
tatl = { workspace = true }
utf8path = { workspace = true }
zerror = { workspace = true }
zerror_core = { workspace = true }
zerror_derive = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }

biometrics_prometheus = { workspace = true }
guacamole = { workspace = true }
sig_fig_histogram = { workspace = true }

[[bin]]
name = "sarosd-recovery"
path = "src/bin/sarosd-recovery.rs"
required-features = ["binaries"]

[[bin]]
name = "saros-query-parse"
path = "src/bin/saros-query-parse.rs"
required-features = ["binaries"]

[[bin]]
name = "saros-prometheus-verify"
path = "src/bin/saros-prometheus-verify.rs"
required-features = ["binaries"]

[[example]]
name = "saros-generate-prometheus-testdata"
path = "examples/saros-generate-prometheus-testdata.rs"
required-features = ["binaries"]
