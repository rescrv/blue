[package]
name = "statslicer"
version = "0.10.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "Guacamole provides a linearly-seekable random number generator."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = []

[dependencies]
getopts = { workspace = true }

arrrg = { workspace = true }
arrrg_derive = { workspace = true }
sig_fig_histogram = { workspace = true }

[dev-dependencies]
guacamole = { workspace = true }

[[bin]]
name = "statslicer"
path = "src/bin/statslicer.rs"
required-features=["binaries"]

[[bench]]
name = "example"
harness = false
