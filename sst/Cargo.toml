[package]
name = "sst"
version = "0.24.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "SST provides a sorted string table abstraction."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = ["command_line"]
command_line = ["dep:arrrg", "dep:arrrg_derive", "dep:getopts"]

[dependencies]
getopts = { workspace = true, optional = true }
libc = { workspace = true }
crc32c = { workspace = true }
nom = { workspace = true }
siphasher = { workspace = true }

armnod = { workspace = true }
handled = { workspace = true }
arrrg = { workspace = true, optional = true }
arrrg_derive = { workspace = true, optional = true }
biometrics = { workspace = true }
buffertk = { workspace = true }
guacamole = { workspace = true }
indicio = { workspace = true }
prototk_derive = { workspace = true }
prototk = { workspace = true }
setsum = { workspace = true }
sync42 = { workspace = true }
tatl = { workspace = true }
utilz = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
[[bin]]
name = "jester-from-plaintext"
path = "src/bin/jester-from-plaintext.rs"
required-features = ["binaries"]

[[bin]]
name = "sst-stat"
path = "src/bin/sst-stat.rs"
required-features = ["binaries"]

[[bin]]
name = "sst-dump"
path = "src/bin/sst-dump.rs"
required-features = ["binaries"]

[[bin]]
name = "sst-from-log"
path = "src/bin/sst-from-log.rs"
required-features = ["binaries"]

[[bin]]
name = "log-checksum"
path = "src/bin/log-checksum.rs"
required-features = ["binaries"]

[[bin]]
name = "log-truncate-final-partial-frame"
path = "src/bin/log-truncate-final-partial-frame.rs"
required-features = ["binaries"]

[[bin]]
name = "sst-from-plaintext"
path = "src/bin/sst-from-plaintext.rs"
required-features = ["binaries"]

[[bin]]
name = "log-options"
path = "src/bin/log-options.rs"
required-features = ["binaries"]

[[bin]]
name = "sst-checksum"
path = "src/bin/sst-checksum.rs"
required-features = ["binaries"]

[[bin]]
name = "sst-options"
path = "src/bin/sst-options.rs"
required-features = ["binaries"]

[[bin]]
name = "sst-inspect"
path = "src/bin/sst-inspect.rs"
required-features = ["binaries"]

[[bin]]
name = "log-dump"
path = "src/bin/log-dump.rs"
required-features = ["binaries"]

[[bin]]
name = "log-from-plaintext"
path = "src/bin/log-from-plaintext.rs"
required-features = ["binaries"]
