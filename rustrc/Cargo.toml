[package]
name = "rustrc"
version = "0.21.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "rustrc is an rc-inspired init system as a library"
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = []

[dependencies]
libc = { workspace = true }
getopts = { workspace = true }

arrrg = { workspace = true }
arrrg_derive = { workspace = true }
biometrics = { workspace = true }
indicio = { workspace = true }
minimal_signals = { workspace = true }
one_two_eight = { workspace = true }
rc_conf = { workspace = true }
shvar = { workspace = true }
unix_sock = { workspace = true }
utf8path = { workspace = true }

[[bin]]
name = "rustrc"
path = "src/bin/rustrc.rs"
required-features=["binaries"]

[[bin]]
name = "rustrc-smoke-test"
path = "src/bin/rustrc-smoke-test.rs"
required-features=["binaries"]
