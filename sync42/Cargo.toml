[package]
name = "sync42"
version = "0.16.0"
authors = ["Robert Escriva <robert@rescrv.net>"]
edition = { workspace = true }
description = "sync42 provides synchronization tools."
license = "Apache-2.0"
repository = "https://github.com/rescrv/blue"

[features]
default = ["binaries"]

binaries = []

[dependencies]
biometrics = { workspace = true }

[dev-dependencies]
guacamole = { workspace = true }

[[example]]
name = "clicker"
path = "examples/clicker.rs"
required-features=["binaries"]

[[example]]
name = "collector"
path = "examples/collector.rs"
required-features=["binaries"]

[[example]]
name = "monitor"
path = "examples/monitor.rs"
required-features=["binaries"]

[[example]]
name = "spin_lock"
path = "examples/spin_lock.rs"
required-features=["binaries"]

[[example]]
name = "work_coalescing_queue"
path = "examples/work_coalescing_queue.rs"
required-features=["binaries"]
